name: esg_mobile
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  animated_toggle_switch: ^0.8.5
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  http: ^1.2.2
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  go_router: ^17.0.0
  supabase: ^2.10.0
  supabase_codegen: ^3.0.1
  supabase_flutter: ^2.10.3
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.10
  intl: ^0.20.2
  dynamic_tabbar: ^1.0.9
  url_launcher: ^6.3.0
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^18.0.1
  portone_flutter: ^0.12.1
  flutter_cache_manager: ^3.4.1
  file_picker: ^10.3.10
  flutter_markdown: ^0.7.7+1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  assets:
    - .env
    - assets/images/icons/
    - assets/images/nav_bar/
    - assets/images/carousel/
    - assets/images/about/
    - assets/images/award_points/
    - assets/images/story_comments/
    # - assets/images/screen/settings/
  fonts:
    - family: EB Garamond
      fonts:
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-Regular.ttf
          weight: 400
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-Medium.ttf
          weight: 500
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-Bold.ttf
          weight: 700
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-Italic.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-MediumItalic.ttf
          style: italic
          weight: 500
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-SemiBoldItalic.ttf
          style: italic
          weight: 600
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-BoldItalic.ttf
          style: italic
          weight: 700
        - asset: assets/fonts/EB_Garamond/static/EBGaramond-ExtraBoldItalic.ttf
          style: italic
          weight: 800
    - family: Noto Sans KR
      fonts:
        - asset: assets/fonts/Noto_Sans_KR/static/NotoSansKR-Thin.ttf
          weight: 100
        - asset: assets/fonts/Noto_Sans_KR/static/NotoSansKR-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Noto_Sans_KR/static/NotoSansKR-Light.ttf
          weight: 300
        - asset: assets/fonts/Noto_Sans_KR/static/NotoSansKR-Regular.ttf
          weight: 400
        - asset: assets/fonts/Noto_Sans_KR/static/NotoSansKR-Medium.ttf
          weight: 500
        - asset: assets/fonts/Noto_Sans_KR/static/NotoSansKR-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Noto_Sans_KR/static/NotoSansKR-Bold.ttf
          weight: 700
        - asset: assets/fonts/Noto_Sans_KR/static/NotoSansKR-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Noto_Sans_KR/static/NotoSansKR-Black.ttf
          weight: 900
    - family: Source Han Serif
      fonts:
        # NOTE: TTC assets may not be supported on all platforms.
        # If you encounter issues, replace with OTF/TTF variants of SourceHanSerifKR.
        - asset: assets/fonts/Source_Hans_Serif/SourceHanSerif-ExtraLight.ttc
          weight: 200
        - asset: assets/fonts/Source_Hans_Serif/SourceHanSerif-Light.ttc
          weight: 300
        - asset: assets/fonts/Source_Hans_Serif/SourceHanSerif-Regular.ttc
          weight: 400
        - asset: assets/fonts/Source_Hans_Serif/SourceHanSerif-Medium.ttc
          weight: 500
        - asset: assets/fonts/Source_Hans_Serif/SourceHanSerif-SemiBold.ttc
          weight: 600
        - asset: assets/fonts/Source_Hans_Serif/SourceHanSerif-Bold.ttc
          weight: 700
        - asset: assets/fonts/Source_Hans_Serif/SourceHanSerif-Heavy.ttc
          weight: 900
    - family: Source Han Serif KR
      fonts:
        - asset: assets/fonts/Source_Han_Kr/SourceHanSerifK-ExtraLight.otf
          weight: 200
        - asset: assets/fonts/Source_Han_Kr/SourceHanSerifK-Light.otf
          weight: 300
        - asset: assets/fonts/Source_Han_Kr/SourceHanSerifK-Regular.otf
          weight: 400
        - asset: assets/fonts/Source_Han_Kr/SourceHanSerifK-Medium.otf
          weight: 500
        - asset: assets/fonts/Source_Han_Kr/SourceHanSerifK-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Source_Han_Kr/SourceHanSerifK-Bold.otf
          weight: 700
        - asset: assets/fonts/Source_Han_Kr/SourceHanSerifK-Heavy.otf
          weight: 900
  uses-material-design: true
supabase_codegen:
  env: .env # Overrides default: .env
  output: lib/data/models/supabase # Overrides default: supabase/types
  tag: v2 # Overrides default: ''
  debug: false # Overrides default: false
  skipFooter: false # Overrides default: false
