name: esg_mobile
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  animated_toggle_switch: ^0.8.5
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  http: ^1.2.2
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  go_router: ^17.0.0
  supabase: ^2.10.0
  supabase_codegen: ^3.0.1
  supabase_flutter: ^2.10.3
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.10
  intl: ^0.20.2
  dynamic_tabbar: ^1.0.9
  url_launcher: ^6.3.0
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^21.0.0
  portone_flutter: ^0.12.1
  flutter_cache_manager: ^3.4.1
  file_picker: ^10.3.10
  flutter_markdown: ^0.7.7+1
  shared_preferences: ^2.5.4
  flutter_widget_from_html_core: ^0.17.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  assets:
    - .env
    - assets/images/icons/
    - assets/images/carousel/
    - assets/images/about/
    - assets/images/award_points/
    # - assets/images/screen/settings/
  # Fonts are loaded dynamically from Supabase storage via FontService
  # to avoid bundling ~390MB of CJK font files into the web build.
  uses-material-design: true
supabase_codegen:
  env: .env # Overrides default: .env
  output: lib/data/models/supabase # Overrides default: supabase/types
  tag: v2 # Overrides default: ''
  debug: false # Overrides default: false
  skipFooter: false # Overrides default: false
